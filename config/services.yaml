version: "3.8"

services:
  # Orchestration
  airflow:
    image: apache/airflow
    version: 2.8.1
    ports: ["8080:8080"]
    command: > 
      bash -c "airflow db init && exec airflow webserver"
    environment:
      AIRFLOW__CORE__EXECUTOR: "CeleryExecutor"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: "{{GENERATE_32}}"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@airflow_postgres:5432/airflow"
      AIRFLOW__CELERY__BROKER_URL: "redis://:${REDIS_PASSWORD}@airflow_redis:6379/0"
    dependencies:
      postgres:
        image: postgres
        version: 16-alpine
        internal: true
        expose: 5432
        environment:
          POSTGRES_USER: "{{GENERATE_12}}"
          POSTGRES_PASSWORD: "{{GENERATE_24}}"
          POSTGRES_DB: "airflow"
      redis:
        image: redis
        version: 7.2-alpine
        internal: true
        expose: 6379
        environment:
          REDIS_PASSWORD: "{{GENERATE_24}}"

  # Databases / Key‑Value
  postgres:
    image: postgres
    version: 16-alpine
    ports: ["5432:5432"]
    environment:
      POSTGRES_USER: "{{GENERATE_12}}"
      POSTGRES_PASSWORD: "{{GENERATE_24}}"
      POSTGRES_DB: "airflow"

  redis:
    image: redis
    version: 7.2-alpine
    ports: ["6379:6379"]
    environment:
      REDIS_PASSWORD: "{{GENERATE_24}}"

  clickhouse:
    image: clickhouse/clickhouse-server
    version: 24.4
    ports: ["8123:8123"]
    expose: ["9000"]
    environment:
      CLICKHOUSE_DB: "default"

  minio:
    image: minio/minio
    version: latest
    ports: ["9000:9000","9001:9001"]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "{{GENERATE_16}}"
      MINIO_ROOT_PASSWORD: "{{GENERATE_32}}"

  # Streaming + Messaging
  zookeeper:
    image: zookeeper
    version: 3.9.3
    ports: ["2181:2181"]
    environment:
      ZOO_TICK_TIME: "2000"

  kafka:
    image: apache/kafka
    version: 3.9.1
    ports: ["9092:29092"]
    command: >
      bash -c "/opt/kafka/bin/kafka-run-class.sh kafka.docker.KafkaDockerWrapper setup
      --default-configs-dir /etc/kafka/docker
      --mounted-configs-dir /mnt/shared/config
      --final-configs-dir /opt/kafka/config >/tmp/kafka-setup.log 2>&1 ||
      grep -q 'legacy cluster' /tmp/kafka-setup.log &&
      exec /opt/kafka/bin/kafka-server-start.sh /opt/kafka/config/server.properties"
    depends_on:
      - zookeeper
    environment:
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_BROKER_ID: "1"
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      KAFKA_LISTENERS: "INTERNAL://:9092,EXTERNAL://:29092"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka:9092,EXTERNAL://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_DEFAULT_REPLICATION_FACTOR: "1"
      KAFKA_MIN_INSYNC_REPLICAS: "1"

  nifi:
    image: apache/nifi
    version: 2.10.0
    ports: ["8443:8443"]
    environment:
      SINGLE_USER_CREDENTIALS_USERNAME: "admin"
      SINGLE_USER_CREDENTIALS_PASSWORD: "{{GENERATE_32}}"
      NIFI_WEB_PROXY_HOST: "localhost:8082"

  # Big‑Data Processing
  spark-master:
    image: apache/spark
    version: 3.5.8
    ports: ["7077:7077","8080:8080"]
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
      --host spark-master --port 7077 --webui-port 8080

  spark-worker:
    image: apache/spark
    version: 3.5.8
    depends_on:
      - spark-master
    ports: ["8081:8081"]
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker
      --webui-port 8081 spark://spark-master:7077

  flink-jobmanager:
    image: stilt-flink
    version: 2.2.0-scala_2.12
    build: &flink-build
      context: .
      args:
        FLINK_VERSION: 2.2.0-scala_2.12
        KAFKA_CONNECTOR_VERSION: 5.0.0-2.2
        KAFKA_CONNECTOR_SHA1: 7bf2ded1144cb8aece05adcaccbc81b2ac3ef339
      dockerfile_inline: |
        ARG FLINK_VERSION
        FROM apache/flink:${FLINK_VERSION}
        ARG KAFKA_CONNECTOR_VERSION
        ARG KAFKA_CONNECTOR_SHA1
        USER root
        RUN curl --retry 5 -fsSLo /opt/flink/lib/flink-sql-connector-kafka.jar \
            "https://repo.maven.apache.org/maven2/org/apache/flink/flink-sql-connector-kafka/${KAFKA_CONNECTOR_VERSION}/flink-sql-connector-kafka-${KAFKA_CONNECTOR_VERSION}.jar" \
            && echo "${KAFKA_CONNECTOR_SHA1}  /opt/flink/lib/flink-sql-connector-kafka.jar" | sha1sum -c - \
            && chown flink:flink /opt/flink/lib/flink-sql-connector-kafka.jar
        USER flink
    ports: ["8081:8081"]
    command: "jobmanager"
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager

  flink-taskmanager:
    image: stilt-flink
    version: 2.2.0-scala_2.12
    build: *flink-build
    depends_on:
      - flink-jobmanager
    command: "taskmanager"
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 2

  # Orchestration & DAGs (already had Airflow), plus:
  dagster:
    image: dagster/dagster-k8s
    version: latest
    ports: ["3000:3000"]
    command: "dagster-webserver --host 0.0.0.0 --port 3000 --empty-workspace"
    environment:
      DAGSTER_HOME: "/tmp"

  trino:
    image: trinodb/trino
    version: latest
    ports: ["8080:8080"]

  # Search & Analytics
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch
    version: 7.17.28
    ports: ["9200:9200"]
    environment:
      discovery.type: "single-node"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"

  kibana:
    image: docker.elastic.co/kibana/kibana
    version: 7.17.28
    ports: ["5601:5601"]
    depends_on:
      - elasticsearch

  # Visualization & Monitoring
  superset:
    image: apache/superset
    version: latest
    ports: ["8088:8088"]
    environment:
      SUPERSET_SECRET_KEY: "{{GENERATE_64}}"

  metabase:
    image: metabase/metabase
    version: latest
    ports: ["3001:3000"]

  grafana:
    image: grafana/grafana
    version: latest
    ports: ["3002:3000"]

  prometheus:
    image: prom/prometheus
    version: latest
    ports: ["9090:9090"]

volumes:
  minio_data:
